<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>HLM · حلم </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Pinyon+Script&family=Petit+Formal+Script&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory: #f4e7d3;
    --ivory-deep: #ead9bd;
    --paper: #f8efde;
    --rose: #c88597;
    --rose-deep: #a35468;
    --rose-shadow: #6f2a3a;
    --ink: #3a1820;
    --sepia: #5a2a2e;
    --gold: #b48a4a;
    --moss: #6f7a3f;
    --moss-deep: #4b5328;
    --water: #6a8ea0;
    --water-deep: #2f4a5a;
    --lotus: #efb9c4;
    --display: 'Cormorant Garamond', serif;
    --body: 'EB Garamond', serif;
    --script: 'Pinyon Script', cursive;
    --hand: 'Petit Formal Script', cursive;
    --arabic: 'Amiri', serif;
  }
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--ivory);
    color: var(--ink); 
    font-family: var(--body);
    font-size: 18px;
    line-height: 1.6;
    overflow-x: hidden;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(255,255,255,.45), transparent 55%),
      radial-gradient(ellipse at 85% 90%, rgba(111,42,58,.10), transparent 60%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.35  0 0 0 0 0.18  0 0 0 0 0.22  0 0 0 .09 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    background-attachment: fixed;
  }
  ::selection { background: var(--rose); color: var(--paper); }

  .deckle {
    background: var(--paper);
    box-shadow: 0 30px 60px -30px rgba(58,24,32,.4), 0 2px 0 rgba(58,24,32,.06);
    border: 1px solid rgba(58,24,32,.08);
  }
  .smallcaps { font-variant: all-small-caps; letter-spacing: .22em; }
  .dropcap::first-letter {
    font-family: var(--script);
    font-size: 5.5em;
    line-height: .8;
    float: left;
    padding: .12em .12em 0 0;
    color: var(--rose-deep);
  }
  .arabic { font-family: var(--arabic); direction: rtl; }

  /* ============ LOCKED SCREEN ============ */
  .locked-stage {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 40px 20px;
    position: relative;
  }
  .locked-stage::before {
    content: '';
    position: absolute; inset: 0;
    pointer-events: none;
    background: radial-gradient(circle at 50% 50%, transparent 200px, rgba(58,24,32,.18) 100%);
  }
  .locked-wrap { text-align: center; position: relative; z-index: 1; }
  .hlm-mark {
    font-family: var(--arabic);
    font-size: 28px;
    color: var(--rose-deep);
    margin-bottom: 6px;
    opacity: 0;
  }
  .hlm-sub {
    font-family: var(--display);
    font-style: italic;
    color: var(--sepia);
    font-size: 14px;
    letter-spacing: .35em;
    text-transform: uppercase;
    margin-bottom: 28px;
    opacity: 0;
  }
  .heart-key-set {
    position: relative;
    width: min(420px, 80vw);
    margin: 0 auto;
    opacity: 0;
  }
  .heart-svg { width: 100%; height: auto; display: block; filter: drop-shadow(0 30px 30px rgba(111,42,58,.35)); }
  .heart-svg .heart-left, .heart-svg .heart-right { transition: transform 1.4s cubic-bezier(.6,.05,.2,1); transform-origin: 50% 60%; }
  .heart-svg.opening .heart-left { transform: rotate(-55deg) translate(-30px,-10px); }
  .heart-svg.opening .heart-right { transform: rotate(55deg) translate(30px,-10px); }
  .heart-svg.opening .keyhole-g { opacity: 0; transition: opacity .6s; }

  .key-row {
    margin-top: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    position: relative;
  }
  .key-bow {
    width: 96px; height: 96px;
    border: 3px solid var(--gold);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #e7c989, #b48a4a 60%, #7a5a2a);
    display: grid; place-items: center;
    box-shadow: inset 0 -8px 16px rgba(0,0,0,.3), 0 6px 12px rgba(58,24,32,.35);
    position: relative;
    flex: 0 0 auto;
  }
  .key-bow::before {
    content: '';
    position: absolute; inset: 12px;
    border: 2px dashed rgba(58,24,32,.35);
    border-radius: 50%;
  }
  .key-bow .ar {
    font-family: var(--arabic);
    color: var(--ink);
    font-size: 26px;
    font-weight: 700;
    text-shadow: 0 1px 0 rgba(255,255,255,.35);
  }
  .key-shaft {
    width: 180px; height: 22px;
    background: linear-gradient(180deg, #d8b070, #b48a4a 50%, #8a6230);
    position: relative;
    box-shadow: inset 0 -3px 6px rgba(0,0,0,.35);
  }
  .key-shaft::after {
    content: '';
    position: absolute;
    right: 0; bottom: -14px;
    width: 8px; height: 28px;
    background: linear-gradient(180deg, #b48a4a, #8a6230);
  }
  .key-shaft::before {
    content: '';
    position: absolute;
    right: 16px; bottom: -10px;
    width: 8px; height: 22px;
    background: linear-gradient(180deg, #b48a4a, #8a6230);
  }
  .key-input-wrap {
    position: absolute;
    left: 96px; top: -36px;
    width: 180px;
    text-align: center;
  }
  .key-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--sepia);
    font-family: var(--display);
    font-style: italic;
    font-size: 22px;
    color: var(--rose-shadow);
    letter-spacing: .4em;
    text-align: center;
    text-transform: uppercase;
    padding: 6px 0;
    outline: none;
  }
  .key-input::placeholder { color: rgba(90,42,46,.45); font-style: italic; letter-spacing: .3em; }
  .key-hint {
    margin-top: 18px;
    font-family: var(--display);
    font-style: italic;
    font-size: 13px;
    color: var(--sepia);
    letter-spacing: .14em;
  }
  .key-hint .wrong { color: var(--rose-shadow); }
  .key-hint .riddle {
    font-family: var(--display);
    font-style: italic;
    font-size: 22px;
    color: var(--rose-shadow);
    letter-spacing: .03em;
    margin-bottom: 6px;
  }
  .key-hint .riddle-ar {
    font-family: var(--arabic);
    font-style: normal;
    font-size: 15px;
    color: var(--sepia);
    letter-spacing: 0;
  }

  .corner-orn {
    position: fixed;
    width: 120px; height: 120px;
    opacity: .55;
    pointer-events: none;
    z-index: 0;
  }
  .corner-orn.tl { top: 18px; left: 18px; }
  .corner-orn.tr { top: 18px; right: 18px; transform: scaleX(-1); }
  .corner-orn.bl { bottom: 18px; left: 18px; transform: scaleY(-1); }
  .corner-orn.br { bottom: 18px; right: 18px; transform: scale(-1,-1); }

  /* ============ ENVELOPE ============ */
  .envelope-stage {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 80px 20px;
    perspective: 1400px;
  }
  .envelope {
    position: relative;
    width: min(540px, 88vw);
    aspect-ratio: 1.55 / 1;
    transform-style: preserve-3d;
    cursor: pointer;
  }
  .env-face {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, #e7c89a, #c89a6a);
    box-shadow:
      inset 0 0 60px rgba(58,24,32,.25),
      0 30px 50px -20px rgba(58,24,32,.5);
  }
  .env-face::before, .env-face::after {
    content: '';
    position: absolute;
    background: linear-gradient(160deg, #d8b079, #a17a4a);
    box-shadow: inset 0 0 30px rgba(58,24,32,.25);
  }
  .env-face::before {
    inset: 0 50% 0 0;
    clip-path: polygon(0 0, 100% 50%, 0 100%);
  }
  .env-face::after {
    inset: 0 0 0 50%;
    clip-path: polygon(0 50%, 100% 0, 100% 100%);
  }
  .env-flap {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(160deg, #e7c89a, #c89a6a);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top;
    transform: rotateX(0deg);
    transition: transform 1.5s cubic-bezier(.6,.05,.2,1);
    box-shadow: inset 0 0 30px rgba(58,24,32,.25);
    z-index: 3;
  }
  .envelope.open .env-flap { transform: rotateX(180deg); }
  .seal {
    position: absolute;
    top: 38%; left: 50%;
    transform: translate(-50%,-50%);
    width: 100px; height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #c14a5a, #7f1d2f 70%, #5a1422);
    display: grid; place-items: center;
    color: #f4d8c2;
    font-family: var(--arabic);
    font-size: 38px;
    font-weight: 700;
    box-shadow:
      0 6px 14px rgba(58,24,32,.5),
      inset 0 -6px 12px rgba(0,0,0,.4),
      inset 0 6px 12px rgba(255,180,180,.25);
    z-index: 4;
    transition: opacity .6s ease, transform .6s ease;
  }
  .seal::before {
    content: '';
    position: absolute; inset: 6px;
    border-radius: 50%;
    border: 2px dashed rgba(244,216,194,.5);
  }
  .envelope.open .seal { opacity: 0; transform: translate(-50%,-50%) scale(.6) rotate(20deg); }
  .env-hint {
    text-align: center;
    margin-top: 24px;
    font-family: var(--display);
    font-style: italic;
    color: var(--sepia);
    letter-spacing: .12em;
  }

  /* ============ LETTER PAGE ============ */
  .letter-stage {
    padding: 80px 20px 120px;
    display: flex;
    justify-content: center;
  }
  .letter {
    width: min(720px, 100%);
    background: var(--paper);
    padding: 64px 56px;
    position: relative;
    box-shadow:
      0 50px 80px -40px rgba(58,24,32,.5),
      0 2px 0 rgba(58,24,32,.06);
    border: 1px solid rgba(58,24,32,.08);
  }
  .letter::before, .letter::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 14px;
    background:
      repeating-linear-gradient(45deg, transparent 0 8px, rgba(58,24,32,.08) 8px 9px),
      var(--paper);
  }
  .letter::before {
    top: 0;
    clip-path: polygon(0 0,4% 100%,8% 0,12% 100%,16% 0,20% 100%,24% 0,28% 100%,32% 0,36% 100%,40% 0,44% 100%,48% 0,52% 100%,56% 0,60% 100%,64% 0,68% 100%,72% 0,76% 100%,80% 0,84% 100%,88% 0,92% 100%,96% 0,100% 100%,100% 0);
  }
  .letter::after {
    bottom: 0;
    clip-path: polygon(0 100%,4% 0,8% 100%,12% 0,16% 100%,20% 0,24% 100%,28% 0,32% 100%,36% 0,40% 100%,44% 0,48% 100%,52% 0,56% 100%,60% 0,64% 100%,68% 0,72% 100%,76% 0,80% 100%,84% 0,88% 100%,92% 0,96% 100%,100% 0,100% 100%);
  }

  .arabic-letter {
    direction: rtl;
    text-align: right;
    font-family: var(--arabic);
  }
  .arabic-letter .en-mark {
    color: var(--rose-deep);
    font-size: 12px;
    margin-bottom: 4px;
    direction: ltr;
    text-align: left;
    font-family: var(--display);
  }
  .arabic-letter .ar-greeting {
    font-family: var(--arabic);
    font-weight: 700;
    color: var(--rose-shadow);
    font-size: clamp(48px, 7vw, 72px);
    line-height: 1.15;
    margin: 0 0 8px;
  }
  .arabic-letter .salutation {
    font-family: var(--arabic);
    font-style: italic;
    color: var(--sepia);
    font-size: 17px;
    margin-bottom: 26px;
  }
  .arabic-letter p {
    font-family: var(--arabic);
    font-size: 22px;
    line-height: 1.85;
    color: var(--ink);
    margin: 0 0 22px;
  }
  .arabic-letter p em {
    color: var(--rose-shadow);
    font-style: normal;
    font-weight: 700;
  }
  .arabic-letter .en {
    font-family: var(--display);
    font-style: italic;
    font-size: 19px;
    color: var(--rose-deep);
    direction: ltr;
    unicode-bidi: isolate;
    display: inline-block;
    margin: 0 .2em;
  }
  .arabic-letter .ar-sign-off {
    font-family: var(--script);
    font-size: 38px;
    color: var(--rose-deep);
    margin-top: 28px;
    line-height: 1;
    direction: rtl;
  }
  .arabic-letter .ar-question {
    position: relative;
    margin: 36px 0 30px;
    padding: 30px 30px 28px;
    background: linear-gradient(180deg, rgba(200,133,151,.10), rgba(200,133,151,.04));
    border-top: 1px solid rgba(111,42,58,.22);
    border-bottom: 1px solid rgba(111,42,58,.22);
  }
  .arabic-letter .ar-question::before,
  .arabic-letter .ar-question::after {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 60px; height: 1px;
    background: var(--rose-deep);
    opacity: .5;
  }
  .arabic-letter .ar-question::before { top: -1px; box-shadow: 0 6px 0 -1px var(--paper), 0 7px 0 rgba(111,42,58,.22); }
  .arabic-letter .ar-question::after  { bottom: -1px; }
  .arabic-letter .ar-question p { margin: 0 0 14px; }
  .arabic-letter .ar-question-mark {
    position: absolute;
    top: -30px; right: 18px;
    font-family: var(--script);
    font-size: 120px;
    color: var(--rose);
    line-height: 1;
    opacity: .35;
    pointer-events: none;
  }
  .arabic-letter .ar-question-line {
    font-family: var(--arabic);
    font-weight: 700;
    font-size: 30px;
    color: var(--rose-shadow);
    line-height: 1.4;
    margin: 6px 0 8px !important;
  }
  .arabic-letter .ar-question-sub {
    font-family: var(--arabic);
    font-size: 20px;
    color: var(--sepia);
    margin: 0 !important;
  }

  /* ============ VIGNETTES ============ */
  section.vignette {
    position: relative;
    padding: 120px 24px;
    overflow: hidden;
  }
  .vignette .inner {
    max-width: 920px; margin: 0 auto;
    position: relative; z-index: 2;
  }
  .vignette h3 {
    font-family: var(--script);
    font-weight: 400;
    font-size: clamp(56px, 9vw, 96px);
    line-height: .95;
    margin: 0 0 20px;
  }
  .vignette .eyebrow {
    font-family: var(--display);
    font-style: italic;
    letter-spacing: .35em;
    font-size: 13px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  /* hearts vignette */
  .v-hearts {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(200,133,151,.45), transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(239,185,196,.45), transparent 60%),
      var(--ivory);
  }
  .v-hearts h3 { color: var(--rose-shadow); }
  .v-hearts .eyebrow { color: var(--rose-deep); }
  .floating-heart {
    position: absolute;
    color: var(--rose);
    opacity: .55;
    animation: float 11s ease-in-out infinite;
    z-index: 1;
    will-change: transform;
  }
  @keyframes float {
    0%,100% { transform: translateY(0) rotate(var(--r, 0deg)); }
    50% { transform: translateY(-30px) rotate(calc(var(--r, 0deg) + 8deg)); }
  }

  /* acrostic — سلام */
  .acrostic-title {
    margin: 0 0 24px;
    direction: rtl;
    text-align: right;
  }
  .acrostic-title-ar {
    font-family: var(--arabic);
    font-weight: 700;
    font-size: clamp(64px, 14vw, 160px);
    color: var(--rose-shadow);
    line-height: 1.1;
    letter-spacing: -.02em;
    text-shadow: 0 2px 0 rgba(255,255,255,.4);
    padding-bottom: 0.06em;
    display: block;
  }
  .acrostic-title-en {
    font-family: var(--display);
    font-style: italic;
    color: var(--rose-deep);
    font-size: clamp(16px, 2.2vw, 26px);
    display: block;
    margin-top: 4px;
  }
  .acrostic-lede {
    max-width: 720px;
    font-family: var(--arabic);
    font-size: 21px;
    color: var(--sepia);
    line-height: 1.7;
    margin: 0 0 40px;
    clear: both;
  }
  .acrostic-lede .en {
    font-family: var(--display);
    font-style: italic;
    color: var(--rose-deep);
    direction: ltr;
    unicode-bidi: isolate;
    display: inline-block;
  }
  .acrostic-list { display: flex; flex-direction: column; gap: 22px; }
  .acrostic-row {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 26px;
    align-items: stretch;
    background: rgba(255,247,235,.7);
    border: 1px solid rgba(111,42,58,.18);
    padding: 26px 28px;
    box-shadow: 0 16px 30px -20px rgba(111,42,58,.35);
    opacity: 0;
    transform: translateX(24px);
    will-change: transform, opacity;
  }
  @media (max-width: 640px) {
    .acrostic-row { grid-template-columns: 90px 1fr; padding: 20px 18px; gap: 16px; }
  }
  .acrostic-letter {
    position: relative;
    display: grid;
    place-items: center;
    aspect-ratio: 1 / 1;
    color: var(--rose-shadow);
  }
  .acrostic-letter-glyph {
    font-family: var(--arabic);
    font-weight: 700;
    font-size: 96px;
    line-height: 1;
    color: var(--rose-shadow);
    text-shadow: 0 2px 0 rgba(255,255,255,.5);
    position: relative;
    z-index: 1;
  }
  @media (max-width: 640px) { .acrostic-letter-glyph { font-size: 70px; } }
  .acrostic-letter-ring {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    animation: ring-spin 40s linear infinite;
    will-change: transform;
  }
  @keyframes ring-spin { to { transform: rotate(360deg); } }
  .acrostic-letter::after {
    content: '';
    position: absolute;
    inset: 14%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(239,185,196,.7), rgba(200,133,151,.15) 60%, transparent 80%);
    z-index: 0;
  }
  .acrostic-body {
    direction: rtl;
    text-align: right;
    padding-top: 6px;
  }
  .acrostic-trait {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .acrostic-trait-ar {
    font-family: var(--arabic);
    font-weight: 700;
    font-size: 28px;
    color: var(--rose-deep);
  }
  .acrostic-text {
    margin: 0;
    font-family: var(--arabic);
    font-size: 20px;
    line-height: 1.85;
    color: var(--ink);
  }

  /* ============ VIGNETTE 2 — MENAGERIE ============ */
  .v-menagerie {
    background:
      radial-gradient(ellipse at 18% 22%, rgba(239,185,196,.45), transparent 55%),
      radial-gradient(ellipse at 82% 78%, rgba(244,214,194,.45), transparent 55%),
      var(--ivory);
    color: var(--ink);
  }
  .v-menagerie .eyebrow { color: var(--rose-deep); }
  .menag-title {
    margin: 0 0 22px;
    display: flex;
    align-items: baseline;
    gap: 20px;
    flex-wrap: wrap;
    font-weight: 400;
    line-height: 1.1;
  }
  .menag-title-ar {
    font-family: var(--arabic);
    font-weight: 700;
    font-size: clamp(54px, 8vw, 96px);
    color: var(--rose-shadow);
    line-height: 1.15;
    padding-bottom: 6px;
  }
  .menag-title-en {
    font-family: var(--display);
    font-style: italic;
    color: var(--rose-deep);
    font-size: clamp(18px, 2.2vw, 26px);
    direction: ltr;
  }

  /* background sticker layer */
  .sticker-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .sticker {
    position: absolute;
    display: inline-block;
    line-height: 0;
    animation: stickerFloat 6s ease-in-out infinite;
  }
  @keyframes stickerFloat {
    0%,100% { transform: translate(-50%,-50%) rotate(var(--r,0)); }
    50%      { transform: translate(-50%,calc(-50% - 6px)) rotate(var(--r,0)); }
  }

  /* creature cards grid */
  .menag-pair {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 32px;
    margin: 32px 0 0;
    position: relative;
    z-index: 2;
  }
  @media (max-width: 820px) {
    .menag-pair { grid-template-columns: 1fr 1fr; }
    .menag-pair > :nth-child(3) { grid-column: 1 / -1; max-width: 60%; margin: 0 auto; }
  }
  @media (max-width: 520px) {
    .menag-pair { grid-template-columns: 1fr; }
    .menag-pair > :nth-child(3) { max-width: 100%; }
  }
  .creature-card {
    background: rgba(255,247,235,.78);

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

gsap.registerPlugin(ScrollTrigger);

/* ============ LOGIN NOTIFICATION ============ */
// EmailJS credentials — sign up free at emailjs.com, then:
//   1. Add a Gmail service  →  copy the Service ID below
//   2. Create a template with variables {{login_time}} and {{location}}  →  copy Template ID
//   3. Go to Account → Public Key  →  copy it below
const EMAILJS_SERVICE_ID  = 'service_huul8xo';   // e.g. 'service_abc123'
const EMAILJS_TEMPLATE_ID = 'template_gp8zfkn';  // e.g. 'template_xyz789'
const EMAILJS_PUBLIC_KEY  = 'axDithMkQDNKZEYV5';   // e.g. 'AbCdEfGhIjKlMnOp'

emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

async function sendLoginNotification() {
  const timeStr = new Date().toLocaleString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    timeZoneName: 'short'
  });

  let locationStr = 'Unavailable';
  try {
    const res  = await fetch('https://ip-api.com/json/');
    const data = await res.json();
    if (data.status === 'success') {
      locationStr = `${data.city}, ${data.regionName}, ${data.country} · IP ${data.query}`;
    }
  } catch (_) {}

  try {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_email:   'al.goat.143@gmail.com',
      login_time: timeStr,
      location:   locationStr,
    });
  } catch (_) {}
}

/* ============ HEART LOCK ============ */
function HeartLock({ onUnlock }) {
  const [val, setVal] = useState('');
  const [hint, setHint] = useState('idle');
  const inputRef = useRef(null);
  const heartRef = useRef(null);
  const wrapRef  = useRef(null);
  const markRef  = useRef(null);
  const subRef   = useRef(null);
  const keySetRef = useRef(null);

  // entrance animation
  useEffect(() => {
    inputRef.current?.focus();
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.to(markRef.current,   { opacity: 1, y: 0, duration: .9 }, .2)
      .to(subRef.current,    { opacity: 1, y: 0, duration: .9 }, .4)
      .to(keySetRef.current, { opacity: 1, y: 0, duration: 1 }, .55);
  }, []);

  const submit = (e) => {
    e?.preventDefault();
    if (val.trim().toUpperCase() === 'SALAM') {
      setHint('opening');
      sendLoginNotification(); // fire-and-forget — does not delay unlock
      // Heart halves open with GSAP
      const heart = heartRef.current;
      heart.classList.add('opening');
      // bloom glow
      gsap.to(heart, { filter: 'drop-shadow(0 0 40px rgba(200,133,151,.9)) drop-shadow(0 30px 30px rgba(111,42,58,.35))', duration: .8 });
      gsap.delayedCall(1.5, onUnlock);
    } else {
      setHint('wrong');
      // GSAP shake — much smoother than CSS keyframes
      gsap.timeline({ onComplete: () => setHint('idle') })
        .to(heartRef.current, { x: -10, rotation: -2.5, duration: .06, ease: 'none' })
        .to(heartRef.current, { x:  9,  rotation:  2,   duration: .06, ease: 'none' })
        .to(heartRef.current, { x: -7,  rotation: -1.5, duration: .06, ease: 'none' })
        .to(heartRef.current, { x:  6,  rotation:  1,   duration: .06, ease: 'none' })
        .to(heartRef.current, { x:  0,  rotation:  0,   duration: .08, ease: 'power2.out' });
    }
  };

  return (
    <div className="locked-stage">
      <div className="locked-wrap" ref={wrapRef}>
        <div className="hlm-mark" ref={markRef} style={{ transform: 'translateY(14px)' }}>حلم</div>
        <div className="hlm-sub"  ref={subRef}  style={{ transform: 'translateY(14px)' }}>H · L · M &nbsp;·&nbsp; a dream</div>

/* ============ ENVELOPE ============ */
function Envelope({ onOpen }) {
  const [open, setOpen] = useState(false);
  const stageRef = useRef(null);

  useEffect(() => {
    gsap.from(stageRef.current, { opacity: 0, scale: .96, duration: 1, ease: 'power3.out', delay: .2 });
  }, []);

  const handleClick = () => {
    if (open) return;
    setOpen(true);
    gsap.delayedCall(1.6, onOpen);
  };

  return (
    <div className="envelope-stage" ref={stageRef}>
      <div>
        <div className={`envelope ${open ? 'open' : ''}`} onClick={handleClick}>
          <div className="env-face"></div>
          <div className="seal">س</div>
          <div className="env-flap"></div>
        </div>
        <div className="env-hint">{open ? '…' : 'tap to open the envelope'}</div>
      </div>
    </div>
  );
}

/* ============ THE LETTER ============ */
function Letter() {
  const ref = useRef(null);
  useEffect(() => {
    const article = ref.current;
    const header = [
      article.querySelector('.en-mark'),
      article.querySelector('.ar-greeting'),
      article.querySelector('.salutation'),
    ];
    const body = [...article.querySelectorAll('p:not(.salutation), .ar-question, .ar-sign-off')];
    gsap.set([...header, ...body], { opacity: 0, y: 18 });
    // Header cascades in on mount
    gsap.to(header, { opacity: 1, y: 0, duration: 1, ease: 'power3.out', stagger: .22, delay: .15 });
    // Each body paragraph reveals as it enters the viewport
    body.forEach(el => {
      ScrollTrigger.create({
        trigger: el, start: 'top 88%', once: true,
        onEnter: () => gsap.to(el, { opacity: 1, y: 0, duration: .9, ease: 'power3.out' })
      });
    });
  }, []);

  return (
    <div className="letter-stage">
      <article className="letter arabic-letter" ref={ref} dir="rtl">
        <div className="smallcaps en-mark">a letter · a dream · حلم</div>
        <h2 className="ar-greeting">سلام…</h2>
        <p className="salutation">كلمات طويلة، ومشاعر أعمق a long letter &amp; deeper feelings.</p>

        <p>
          بكتبلك هالكلام وأنا متردد كتير كيف ابدأ، مو لأنو الكلام قليل،
          بس لأنو المشاعر اللي جواتي أكبر بكتير من إنو توصفها مجرد حروف.
          صارلي فترة عم فكر بكل شي عم بصير معنا، وحسيت إنو لازم كون
          صريح معك لأبعد حدود، لأنك بتستاهلي كل الصدق اللي بالدنيا.
        </p>

        <p>
          أنا فعلا شايفك إنسانة مميزة، إنسانة ما بتتعوض وما في منها اتنين.
          كل تفصيل فيكي بيعنيلي، وبكل صراحة، صرت بشوفك جزء أساسي من مستقبلي
          ومن كل حلم عم بحلمه.. أنتي مو مجرد "حدا" بحياتي، أنتي 
          <em> الأمل </em>
          اللي عم يعطيني طاقة لبكرة.
        </p>

        <p>
          ومتل ما بتعرفي، ومثل ما حكينا قبل， 
          ما بحب أكون بعلاقة رسمية إلا لما تكون الخطبة هي الأساس.
          بس بالوقت نفسه، بعرف إنو الظروف حالياً مو سهلة؛ أنتي  لساتك صغيرة
           وأنا كمان لساتني طالب وعم أسس حالي.
        </p>

        <p>
          لكن بدي تعرفي إنو هاد "الوقت" وهي "الظروف" أبدا ما بيغيروا ذرة
          من شعوري تجاهك. بالعكس، هاد الشي عم يخليني صمم أكتر إني أشتغل
          على حالي، وأتعب، وأبذل كل جهدي لحتى أكون قد المسؤولية اللي بتستحقيها.
          هدفي الوحيد إني أقدر بيوم من الأيام أمنلك الحياة اللي بتليق فيكي،
          وتكوني مرتاحة وراضية ومبسوطة معي.
        </p>

        <p>
          أنا مستعد أوقف جنبك، وكون سندك، وأحارب كرمالك وكرمال وصولنا لبعض
          مهما كانت التحديات صعبة ومهما واجهنا ضغوطات.. أنتي  بتستاهلي المحاربة،
          وبتستاهلي الصبر. يعني رح صير سوبرمان بس بنسخة طالب هندسة تعبان وناقصو نوم،
          بس كرمالك كلو بيهون، إلا إذا كان عندي امتحان الصبح، هون بنأجل الحرب شوي!
        </p>

        <div className="ar-question">
          <div className="ar-question-mark">؟</div>
          <p>بس بالنهاية، هاد الطريق طويل وبدو قوة من الطرفين.. لهيك حبيت أسألك بكل حب ووضوح:</p>
          <p className="ar-question-line">إنتِ مستعدة تكوني معي بهالطريق؟</p>
          <p className="ar-question-sub">مستعدة نصبر سوا ونبني مستقبلنا خطوة بخطوة لحتى نوصل للي بنتمناه؟</p>
        </div>

        <p className="ar-sign-off">— حلمك،</p>
      </article>
    </div>
  );
}

      y: -55, ease: 'none',

/* ============ VIGNETTE 3 — WATER + LOTUS + FISH ============ */
function WaterVignette() {
  const fish = useMemo(() => {
    const emojis = ['🐟','🪷','🐠'];
    return Array.from({ length: 3 }, (_, i) => ({
      top: 18 + i * 26,
      delay: -i * 5,
      dur: 18 + i * 4,
      emoji: emojis[i],
      size: 24 + i * 4,
      flip: i % 2 === 0
    }));
  }, []);

  /* 5 hovering lotus positions: [left%, top%, size-px, rotation-deg, delay-s] */
  const lotusFloaters = useMemo(() => [
    [12, 14, 80, -12, 0  ],
    [82, 22, 70,  15, 1.8],
    [48, 10, 90,   0, 0.9],
    [22, 72, 64, -18, 2.4],
    [75, 68, 76,  10, 1.2],
  ], []);

  const ripples = useMemo(() => Array.from({ length: 6 }, (_, i) => ({
    left: 10 + Math.random() * 80,
    top:  20 + Math.random() * 70,
    size: 60 + Math.random() * 120,
    delay: Math.random() * 7
  })), []);

  const sectionRef  = useRef(null);
  const cardRefs    = useRef([]);
  const lotusLayer  = useRef(null);
  const eyebrowRef  = useRef(null);
  const titleRef    = useRef(null);
  const questionRef = useRef(null);

  useEffect(() => {
    gsap.set([eyebrowRef.current, titleRef.current, questionRef.current], { opacity: 0, y: 16 });
    gsap.set(cardRefs.current, { opacity: 0, y: 32 });

    ScrollTrigger.create({
      trigger: sectionRef.current, start: 'top 72%', once: true,
      onEnter: () => {
        gsap.timeline()
          .to(sectionRef.current,   { opacity: 1, y: 0, duration: 1, ease: 'power3.out' })
          .to(eyebrowRef.current,   { opacity: 1, y: 0, duration: .7, ease: 'power3.out' }, '-=.7')
          .to(titleRef.current,     { opacity: 1, y: 0, duration: .9, ease: 'power3.out' }, '-=.4')
          .to(questionRef.current,  { opacity: 1, y: 0, duration: .7, ease: 'power3.out' }, '-=.4')
          .to(cardRefs.current,     {
              opacity: 1, y: 0, duration: .8, stagger: .2, ease: 'power3.out'
            }, '-=.3');
      }
    });

    // Lotus layer parallax — floats up as you scroll through
    gsap.to(lotusLayer.current, {
      y: -80, ease: 'none',
      scrollTrigger: {
        trigger: sectionRef.current, start: 'top bottom', end: 'bottom top', scrub: 1.5
      }
    });
  }, []);

  return (
    <section className="vignette v-water gs-reveal" ref={sectionRef}>
      {ripples.map((r, i) => (
        <div key={i} className="ripple"
          style={{ left: `${r.left}%`, top: `${r.top}%`,
                   width: r.size, height: r.size, animationDelay: `${r.delay}s` }}/>
      ))}

      {/* floating lotus flowers */}
      <div className="lotus-float-layer" aria-hidden="true" ref={lotusLayer}>
        {lotusFloaters.map(([l, t, sz, rot, del], i) => (
          <div key={i} className="lotus-floater"
            style={{ left:`${l}%`, top:`${t}%`,
                     width: sz, height: sz,
                     '--r':`${rot}deg`,
                     animationDelay:`${del}s`,
                     animationDuration:`${7 + del}s` }}>
            <Lotus/>
          </div>
        ))}
      </div>

      <div className="fish-school">
        {fish.map((f, i) => (
          <span key={i} className="fish"
            style={{ top: `${f.top}%`, animationDuration: `${f.dur}s`,
                     animationDelay: `${f.delay}s`, fontSize: f.size,
                     transform: f.flip ? 'scaleX(-1)' : 'none' }}>
            {f.emoji}
          </span>
        ))}
      </div>

      <div className="inner">
        <div className="eyebrow" ref={eyebrowRef}>vignette no. 3 — اللوتس · the lotus</div>
        <div className="lotus-title" dir="rtl" ref={titleRef}>
          <span className="lotus-title-ar">اللوتس</span>
          <span className="lotus-title-en">&nbsp;— a flower that rises through mud.</span>
        </div>

        <div className="lotus-question" dir="rtl" ref={questionRef}>
          بتعرفي شقد زهرة اللوتس بتذكرني فيكي؟
        </div>

        <p className="body lotus-body" dir="rtl">
          اللوتس بتطلع من بين الطين اللي بالنهر، وبتواجه صعوبات كبيرة لحتى
          تطلع على وش المي وتصير بهاد الجما.لاللوتس تدل على الأمل .. أنتي متلها تماماً.
          أنتي الأمل اللي أجاني بالوقت اللي كنت فيه رافض الأمل، وأنتي
          الحلم اللي رح ضل متمسك فيه لأبعد حد.
        </p>

        <div className="lotus-row">
          {[
            '"بتطلع من الطين، وبتصير أحلى زهرة."',
            '"أنتي الأمل لما الدنيا كانت بلا أمل."',
            '"حلمي اللي رح ضل متمسك فيه لأبعد حد."'

            <div key={i} className="lotus-card" ref={el => cardRefs.current[i] = el}>
              <Lotus/>
              <p dir="rtl" lang="ar">{txt}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ============ VOICE NOTE ============ */
/*
 * ============ VOICE NOTE ============
 *
 * TO ADD YOUR RECORDING:
 *   1. Rename your audio file to exactly:  voice.mp3
 *   2. Put it in the same folder as index.html
 *   3. Push both files to GitHub — done.
 *
 * Any format works (mp3, m4a, ogg, wav) as long as the
 * filename matches. mp3 has the best cross-browser support.
 *
 * If the file is missing the player shows a soft
 * "coming soon" message — nothing breaks.
 */
function VoiceNote() {
  /* ↓ change this if you name your file differently */
  const AUDIO_FILE = 'voice.m4a';

  const [playing,    setPlaying]    = useState(false);
  const [ready,      setReady]      = useState(false);   // file loaded ok
  const [notFound,   setNotFound]   = useState(false);   // file missing
  const [time,       setTime]       = useState('00:00');
  const [duration,   setDuration]   = useState('--:--');
  const audioRef = useRef(null);
  const ref      = useRef(null);

  /* scroll reveal */
  useEffect(() => {
    ScrollTrigger.create({
      trigger: ref.current,
      start: 'top 80%',
      onEnter: () => gsap.to(ref.current, { opacity: 1, y: 0, duration: 1, ease: 'power3.out' })
    });
  }, []);

  /* audio event wiring */
  useEffect(() => {
    const a = audioRef.current;
    if (!a) return;

    const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(Math.floor(s%60)).padStart(2,'0')}`;

    const onMeta  = () => { setReady(true);  setDuration(fmt(a.duration || 0)); };
    const onTick  = () => setTime(fmt(a.currentTime || 0));
    const onEnded = () => { setPlaying(false); setTime('00:00'); };
    const onErr   = () => { setNotFound(true); setReady(false); };

    a.addEventListener('loadedmetadata', onMeta);
    a.addEventListener('timeupdate',     onTick);
    a.addEventListener('ended',          onEnded);
    a.addEventListener('error',          onErr);
    return () => {
      a.removeEventListener('loadedmetadata', onMeta);
      a.removeEventListener('timeupdate',     onTick);
      a.removeEventListener('ended',          onEnded);
      a.removeEventListener('error',          onErr);
    };
  }, []);

  const toggle = () => {
    const a = audioRef.current;
    if (!a || !ready) return;
    playing ? (a.pause(), setPlaying(false))
            : (a.play().catch(() => {}), setPlaying(true));
  };

  const bars = Array.from({ length: 36 });

  return (
    <div className="voice-stage">
      <div className="voice-card gs-reveal" ref={ref}>
        <div className="eyebrow smallcaps">a small recording</div>
        <h4>press play — &amp; listen.</h4>

        <div className={`player${!ready ? ' player-pending' : ''}`}>
          <button className="play-btn" onClick={toggle}
            aria-label={playing ? 'pause' : 'play'}
            disabled={!ready}
            style={{ opacity: ready ? 1 : .45, cursor: ready ? 'pointer' : 'default' }}>
            {playing
              ? <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                  <rect x="6" y="5" width="4" height="14"/>
                  <rect x="14" y="5" width="4" height="14"/>
                </svg>
              : <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                  <path d="M7 5 L20 12 L7 19 Z"/>
                </svg>}
          </button>

          <div className={`waveform${playing ? ' playing' : ''}`}>
            {bars.map((_, i) => {
              const h = 20 + Math.abs(Math.sin(i * .9)) * 75;
              return <div key={i} className="bar"
                style={{ height: `${h}%`, animationDelay: `${i * .05}s`,
                         opacity: ready ? 1 : .35 }}/>;
            })}
          </div>

          <div className="time">{ready ? time : (notFound ? '--:--' : duration)}</div>
        </div>

        {/* hidden audio element — loads voice.mp3 from same folder */}
        <audio ref={audioRef} src={AUDIO_FILE} preload="metadata"/>

        <div className="upload-hint">
          {notFound
            ? <span style={{ color:'var(--rose-deep)', fontStyle:'italic' }}>
                 coming soon — صوتي رح يوصلك قريب
              </span>
            : ready
              ?'your recording is ready — اضغطي play'
              : <span style={{ opacity: .65 }}>
             loading your message…
                </span>
          }
        </div>
      </div>
    </div>
  );
}

/* ============ QUOTE + SIGNATURE ============ */
function QuoteAndSignature() {
  const quoteRef   = useRef(null);
  const sigRef     = useRef(null);
  const pathRef    = useRef(null);
  const nameRef    = useRef(null);
  const postRef    = useRef(null);
  const loveRef    = useRef(null);

  useEffect(() => {
    // Scroll-triggered quote reveal
    ScrollTrigger.create({
      trigger: quoteRef.current,
      start: 'top 78%',
      onEnter: () => gsap.to(quoteRef.current, { opacity: 1, y: 0, duration: 1.1, ease: 'power3.out' })
    });

    // Signature draw + name cascade
    ScrollTrigger.create({
      trigger: sigRef.current,
      start: 'top 82%',
      onEnter: () => {
        const tl = gsap.timeline();
        tl.to(pathRef.current,  { strokeDashoffset: 0, duration: 3.2, ease: 'power2.inOut' })
          .to(nameRef.current,  { opacity: 1, y: 0, duration: .9, ease: 'power3.out' }, '-=1.2')
          .to(postRef.current,  { opacity: 1, y: 0, duration: .7, ease: 'power3.out' }, '-=.5')
          .to(loveRef.current,  { opacity: 1, y: 0, duration: .7, ease: 'power3.out' }, '-=.4');
      }
    });
  }, []);

  return (
    <>
      <div className="quote-stage gs-reveal" ref={quoteRef}>
        <blockquote>
          "لاقتلن عن التي احبها الا ان اراها في حضاني تنعم"
          <cite>— إلك، يا حلمي · for you, my حلم.</cite>
        </blockquote>
      </div>

      <div className="sig-stage" ref={sigRef}>
        <div className="yours">yours, entirely.</div>
        <div className="printed-name" ref={nameRef} style={{ transform: 'translateY(10px)' }}>Mohamed Lutfi</div>
        <div className="post"     ref={postRef}  style={{ transform: 'translateY(10px)' }}>محمد لطفي · حلمك</div>
        <div className="with-love" ref={loveRef} style={{ transform: 'translateY(10px)' }}>— from my heart, to yours · من قلبي إلى قلبك</div>
      </div>
    </>
  );
}

/* ============ GENERIC REVEAL WATCHER ============ */
// Must be called with the current stage so it re-runs when the letter
// sections actually mount (they don't exist while stage === 'locked').
function useRevealAll(stage) {
  useEffect(() => {
    if (stage !== 'letter') return;
    // Wait one tick so React has flushed all the new section nodes.
    const id = setTimeout(() => {
      ScrollTrigger.refresh();
      document.querySelectorAll('.gs-reveal').forEach(el => {
        // If already scrolled into view (top of page), reveal immediately.
        const rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight * 0.85) {
          gsap.to(el, { opacity: 1, y: 0, duration: 1, ease: 'power3.out' });
          return;
        }
        ScrollTrigger.create({
          trigger: el,
          start: 'top 82%',
          once: true,
          onEnter: () => gsap.to(el, { opacity: 1, y: 0, duration: 1, ease: 'power3.out' })
        });
      });
    }, 80);
    return () => clearTimeout(id);
  }, [stage]);
}

/* ============ MAIN APP ============ */
function App() {
  const [stage, setStage] = useState('locked'); // locked | envelope | letter
  const progressRef = useRef(null);

  useRevealAll(stage);

  // Scroll progress bar — only meaningful during the letter stage
  useEffect(() => {
    if (stage !== 'letter') return;
    const bar = progressRef.current;
    const onScroll = () => {
      const total = document.documentElement.scrollHeight - window.innerHeight;
      const pct = total > 0 ? (window.scrollY / total) * 100 : 0;
      if (bar) bar.style.width = `${pct}%`;
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, [stage]);

  return (
    <>
      <div className="scroll-progress" ref={progressRef}/>
      {stage === 'locked' &&
        <HeartLock onUnlock={() => setStage('envelope')}/>}
      {stage === 'envelope' &&
        <Envelope onOpen={() => setStage('letter')}/>}
      {stage === 'letter' && <>
        <Letter/>
        <HeartsVignette/>
        <GoatsVignette/>
        <WaterVignette/>
        <VoiceNote/>
        <QuoteAndSignature/>
      </>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
