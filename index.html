<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0d0d0d;
      --paper: #f5f0e8;
      --accent: #c8402a;
      --muted: #7a7060;
      --line: #d4cebf;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Decorative horizontal rules */
    body::before, body::after {
      content: '';
      position: fixed;
      left: 0; right: 0;
      height: 3px;
      background: repeating-linear-gradient(90deg, var(--accent) 0, var(--accent) 6px, transparent 6px, transparent 10px);
    }
    body::before { top: 20px; }
    body::after  { bottom: 20px; }

    .frame {
      position: fixed;
      top: 10px; left: 10px; right: 10px; bottom: 10px;
      border: 1px solid var(--line);
      pointer-events: none;
    }

    .container {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 640px;
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.4s forwards;
    }

    h1 span.accent { color: var(--accent); }

    .divider {
      width: 60px;
      height: 2px;
      background: var(--accent);
      margin: 0 auto 2rem;
      opacity: 0;
      animation: scaleIn 0.6s ease 0.8s forwards;
    }

    .tagline {
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeUp 0.8s ease 1s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scaleX(0); }
      to   { opacity: 1; transform: scaleX(1); }
    }
  </style>
</head>
<body>
  <div class="frame"></div>
  <div class="container">
    <p class="eyebrow">My GitHub Page</p>
    <h1>Hello,<br><span class="accent">World.</span></h1>
    <div class="divider"></div>
    <p class="tagline">Built with GitHub Pages &mdash; deployed in minutes.</p>
  </div>
</body>
</html>
